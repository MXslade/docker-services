version: "3.9"

services:
  mongo-db:
    networks:
      - local-shared-network
    image: mongo:7-jammy
    environment:
      - MONGO_INITDB_ROOT_USERNAME=mongoadmin
      - MONGO_INITDB_ROOT_PASSWORD=password
    ports:
      - "27017:27017"
    volumes:
      - ./mongo-db-data:/data/db

networks:
  local-shared-network:
    external: true
